<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<style>
  html, body {
    margin: 0;
    padding: 0;
    background: transparent;
    font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
  }
  
  /* Точно такой же невидимый спасительный контейнер */
  .wrapper {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 450px; 
    padding: 180px 0;  
    background: transparent;
    box-sizing: border-box;
  }

  .dropdown {
    position: relative;
    display: inline-block;
  }

  .tile-img {
    width: 100%;
    max-width: 220px;
    height: auto;
    display: block;
    border-radius: 12px;
    transition: transform 0.25s cubic-bezier(0.25, 0.8, 0.25, 1);
    cursor: pointer;
  }

  /* Меню выпадает вниз под статьи */
  .dropdown-content {
    display: none;
    position: absolute;
    top: 105%;
    left: 50%;
    transform: translateX(-50%);
    background-color: #ffffff;
    min-width: 280px;
    box-shadow: 0px 8px 24px rgba(0,0,0,0.18);
    border-radius: 8px;
    z-index: 9999;
    padding: 6px 0;
    border: 1px solid #e0e0e0;
  }

  .dropdown-content a {
    color: #333333;
    padding: 11px 16px;
    text-decoration: none;
    display: block;
    font-size: 12px;
    font-weight: 600;
    line-height: 1.3;
    border-bottom: 1px solid #f0f0f0;
    transition: background-color 0.2s, color 0.2s;
  }

  .dropdown-content a:last-child {
    border-bottom: none;
  }

  .dropdown-content a:hover {
    background-color: #f5f5f5;
    color: #2e7d32;
  }

  .dropdown:hover .dropdown-content {
    display: block;
  }

  .dropdown:hover .tile-img {
    transform: scale(1.05);
    filter: drop-shadow(0 10px 20px rgba(0,0,0,0.12)) drop-shadow(0 0 8px rgba(46, 125, 50, 0.4));
  }
</style>
</head>
<body>

  <div class="wrapper">
    <div class="dropdown">
      <img src="pic-articles.png" class="tile-img" alt="Материалы для чтения">
      <div class="dropdown-content">
        <a href="https://forbes.kz/articles/malyy-metr-bolshie-vozmozhnosti-pochemu-investory-v-rk-vybirayut-mikroliving-241765" target="_blank">📰 Forbes: Микроливинг в РК</a>
        <a href="https://forbes.kz/articles/fermeram-uvelichat-finansirovanie-vesenne-polevyh-iuborochnyh-rabot-fe9f51" target="_blank">📰 Forbes: Поддержка фермеров в РК</a>
        <a href="https://ru.euronews.com/business/2026/05/12/best-performing-european-equities-by-sector-in-2026" target="_blank">🇪🇺 Euronews: European Equities 2026</a>
        <a href="https://pages.stern.nyu.edu/~adamodar/New_Home_Page/datafile/ctryprem.html" target="_blank">📊 Damodaran: Country Risk Premium</a>
        <a href="https://www.kroll.com/en/tools-and-platforms/cost-of-capital" target="_blank">📈 Kroll: Cost of Capital Tool</a>
        <a href="https://atlas.kpmg.com/de/en/deal-advisory-services/cost-of-capital-and-multiples/market-risk-premium-and-risk-free-rate" target="_blank">🌐 KPMG: Market Risk and Risk-Free Rate</a>
      </div>
    </div>
  </div>

</body>
</html>
