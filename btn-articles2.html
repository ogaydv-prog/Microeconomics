<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: transparent;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: 'Arial', sans-serif;
  }

  /* 3D Контейнер для переворота карточки */
  .flip-card {
    background-color: transparent;
    width: 250px;
    height: 250px;
    perspective: 1000px;
    cursor: pointer;
    transition: transform 0.25s cubic-bezier(0.25, 0.8, 0.25, 1), filter 0.25s ease;
  }

  /* Эффект увеличения и неоновой подсветки при наведении (бирюзовый под цвет плашки статей) */
  .flip-card:hover {
    transform: scale(1.05);
    filter: drop-shadow(0 10px 20px rgba(0,0,0,0.2)) drop-shadow(0 0 12px rgba(13, 148, 136, 0.5));
  }

  /* Внутренняя оболочка для вращения */
  .flip-card-inner {
    position: relative;
    width: 100%;
    height: 100%;
    text-align: center;
    transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    transform-style: preserve-3d;
  }

  /* Класс для совершения переворота */
  .flip-card.flipped .flip-card-inner {
    transform: rotateY(180deg);
  }

  /* Общие стили для обеих сторон */
  .flip-card-front, .flip-card-back {
    position: absolute;
    width: 100%;
    height: 100%;
    -webkit-backface-visibility: hidden;
    backface-visibility: hidden;
    border-radius: 12px;
    overflow: hidden;
    box-sizing: border-box;
  }

  /* ЛИЦЕВАЯ СТОРОНА (Обложка) */
  .flip-card-front {
    background-color: #ffffff;
  }

  .tile-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  /* ОБРАТНАЯ СТОРОНА (Список статей на темном премиум фоне) */
  .flip-card-back {
    background-color: #111418;
    color: #ffffff;
    transform: rotateY(180deg);
    border: 2px solid rgba(13, 148, 136, 0.7); /* Бирюзовый неоновый кант */
    padding: 12px;
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
  }

  /* Шапка обратной стороны */
  .back-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid #2d3748;
    padding-bottom: 6px;
    margin-bottom: 10px;
  }

  .back-title {
    font-size: 11px;
    font-weight: 800;
    text-transform: uppercase;
    color: #14b8a6; /* Бирюзовый акцент */
    letter-spacing: 0.5px;
  }

  /* Кнопка закрытия */
  .btn-close {
    background: none;
    border: none;
    color: #94a3b8;
    cursor: pointer;
    font-size: 13px;
    font-weight: bold;
    padding: 0 4px;
    transition: color 0.2s;
  }

  .btn-close:hover {
    color: #ffffff;
  }

  /* Список статей */
  .article-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .article-link {
    display: block;
    background: rgba(255, 255, 255, 0.04);
    color: #e2e8f0;
    text-decoration: none;
    padding: 8px 10px;
    border-radius: 6px;
    font-size: 10.5px;
    line-height: 1.3;
    text-align: left;
    border: 1px solid rgba(255, 255, 255, 0.06);
    transition: all 0.2s ease;
  }

  .article-link:hover {
    background: rgba(13, 148, 136, 0.2);
    border-color: #14b8a6;
    color: #ffffff;
    transform: translateX(3px);
  }
</style>
</head>
<body>

<div class="flip-card" id="cardContainer">
  <div class="flip-card-inner">
    
    <!-- Лицевая сторона (Загруженная картинка) -->
    <div class="flip-card-front" id="cardFront">
      <img src="pic-articles2.png" class="tile-img" alt="Статьи для ознакомления">
    </div>

    <!-- Обратная сторона (Список ссылок) -->
    <div class="flip-card-back">
      <div class="back-header">
        <span class="back-title">Статьи для анализа</span>
        <button class="btn-close" id="btnClose" title="Назад">✕</button>
      </div>
      
      <!-- Список интерактивных ссылок -->
      <div class="article-list">
        <a href="https://tengrinews.kz/kazakhstan_news/kazahstane-uvelichili-spisok-produktov-kontrolem-tsen-588941/" target="_blank" class="article-link" title="Контроль цен на продукты в РК">
          <strong>1. Tengrinews:</strong> Расширение списка продуктов с госрегулированием цен в РК.
        </a>
        <a href="https://adilet.zan.kz/rus/docs/V2500037326" target="_blank" class="article-link" title="Правила регулирования цен">
          <strong>2. Әділет:</strong> Приказ МТИ РК об утверждении предельно пороговых цен.
        </a>
        <a href="https://forbes.kz/articles/kazahstan-obnovil-minimalnye-tseny-na-import-iz-stran-eaes-288bd8" target="_blank" class="article-link" title="Минимальные цены на импорт из стран ЕАЭС">
          <strong>3. Forbes:</strong> Казахстан обновил минимальные цены на импорт из стран ЕАЭС.
        </a>
      </div>
    </div>

  </div>
</div>

<script>
  const card = document.getElementById('cardContainer');
  const cardFront = document.getElementById('cardFront');
  const btnClose = document.getElementById('btnClose');

  // Переворот на обратную сторону при клике на обложку
  cardFront.addEventListener('click', function(e) {
    card.classList.add('flipped');
  });

  // Переворот обратно при клике на крестик
  btnClose.addEventListener('click', function(e) {
    e.stopPropagation(); // Исключаем повторное срабатывание клика по обложке
    card.classList.remove('flipped');
  });

  // Исключаем переворот карточки обратно при клике по ссылкам
  const links = document.querySelectorAll('.article-link');
  links.forEach(link => {
    link.addEventListener('click', function(e) {
      e.stopPropagation();
    });
  });
</script>

</body>
</html>
