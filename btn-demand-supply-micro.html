<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  /* Полный сброс отступов и скроллбаров для идеальной посадки на Google Сайте */
  body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: transparent;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }
  
  /* Наша фирменная пружинящая кнопка (полностью копирует размеры и анимацию pic-micro) */
  .main-tile-btn {
    background: none;
    border: none;
    padding: 0;
    cursor: pointer;
    display: inline-block;
    transition: transform 0.25s cubic-bezier(0.25, 0.8, 0.25, 1), filter 0.25s ease;
    outline: none;
    -webkit-tap-highlight-color: transparent;
    width: 100%;
    max-width: 250px; /* Идеально совпадает по размеру с плиткой силлабуса */
    height: auto;
  }
  
  /* Эффект плавного увеличения и мягкого голубого свечения эластичности при наведении */
  .main-tile-btn:hover {
    transform: scale(1.05);
    filter: drop-shadow(0 10px 20px rgba(0,0,0,0.15)) drop-shadow(0 0 12px rgba(56, 189, 248, 0.65));
  }
  
  /* Эффект физического клика */
  .main-tile-btn:active {
    transform: scale(0.98);
  }
  
  .tile-img {
    width: 100%;
    height: auto;
    display: block;
    border-radius: 12px;
  }
</style>
</head>
<body>

  <!-- При нажатии открывается страница "Теория спроса и предложения" в новом окне -->
  <a href="https://sites.google.com/view/managerial-economics-mba/%D0%B7%D0%B0%D0%BD%D1%8F%D1%82%D0%B8%D1%8F/%D1%82%D0%B5%D0%BE%D1%80%D0%B8%D1%8F-%D1%81%D0%BF%D1%80%D0%BE%D1%81%D0%B0-%D0%B8-%D0%BF%D1%80%D0%B5%D0%B4%D0%BB%D0%BE%D0%B6%D0%B5%D0%BD%D0%B8%D1%8F" target="_blank" class="main-tile-btn">
    
    <!-- Используем прямой абсолютный путь к картинке pic-demand-supply.png на GitHub -->
    <img src="https://raw.githubusercontent.com/ogaydv-prog/Microeconomics/master/pic-demand-supply.png" 
         class="tile-img" 
         alt="Перейти к разделу: Теория спроса и предложения" 
         draggable="false" 
         onerror="this.src='https://placehold.co/250x250/0f172a/38bdf8?text=Спрос+и+Предложение'">
         
  </a>

</body>
</html>
