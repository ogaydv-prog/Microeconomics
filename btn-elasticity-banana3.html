<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: transparent;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }
  
  /* Фирменная пружинящая кнопка */
  .main-tile-btn {
    background: none;
    border: none;
    padding: 0;
    cursor: pointer;
    display: inline-block;
    transition: transform 0.25s cubic-bezier(0.25, 0.8, 0.25, 1), filter 0.25s ease;
    outline: none;
    -webkit-tap-highlight-color: transparent;
  }
  
  /* Эффект увеличения и мягкой неоновой подсветки при наведении */
  .main-tile-btn:hover {
    transform: scale(1.05);
    filter: drop-shadow(0 10px 20px rgba(0,0,0,0.15)) drop-shadow(0 0 12px rgba(22, 163, 74, 0.6));
  }
  
  .main-tile-btn:active {
    transform: scale(0.98);
  }
  
  .tile-img {
    width: 100%;
    max-width: 250px; 
    height: auto;
    display: block;
    border-radius: 12px;
  }
</style>
</head>
<body>

  <!-- Кнопка с иконкой pic-sim-demand-analysis-1-1.png -->
  <button id="btn-elasticity" class="main-tile-btn">
    <img src="pic-sim-demand-analysis-1-1.png" class="tile-img" alt="Симулятор: Эластичность спроса">
  </button>

<script>
  document.getElementById("btn-elasticity").addEventListener("click", function() {
    // Открытие симулятора sim-elasticity-banana3.html в новой вкладке
    window.open("sim-elasticity-banana3.html", "_blank");
  });
</script>

</body>
</html>
