<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Кнопка симулятора эластичности</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Плавные переходы для анимации */
        .simulator-btn {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: inline-block;
            outline: none;
            border: none;
            background: transparent;
            padding: 0;
            cursor: pointer;
        }

        /* Эффект при наведении */
        .simulator-btn:hover {
            transform: scale(1.08);
            filter: brightness(1.2) drop-shadow(0 10px 15px rgba(0, 0, 0, 0.3));
        }

        /* Эффект при нажатии */
        .simulator-btn:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen bg-gray-100">

    <!-- Кнопка, которая ведет на файл симулятора -->
    <a href="sim-elastisity-sport.html" class="simulator-btn">
        <img 
            src="pic-sim-elastisity-sport.png" 
            alt="Запустить симулятор"
            class="block"
        >
    </a>

</body>
</html>
</html>
