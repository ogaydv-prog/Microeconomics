<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Запуск симулятора</title>
    <style>
        /* Обеспечиваем белый фон для всего документа */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #ffffff !important;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Контейнер-ссылка */
        .launcher-link {
            display: inline-block;
            cursor: pointer;
            transition: transform 0.2s ease;
            text-decoration: none;
            /* Убираем любые ограничения размера */
            line-height: 0;
        }

        .launcher-link:hover {
            transform: scale(1.02);
        }

        /* Картинка: сохраняем исходный размер и пропорции */
        .launcher-link img {
            display: block;
            max-width: 100vw; /* Ограничение только размером экрана */
            max-height: 100vh;
            width: auto;
            height: auto;
            object-fit: contain; /* Картинка полностью помещается без обрезки */
            border: none;
        }
    </style>
</head>
<body>

    <a href="sim-elastisity1.html" class="launcher-link">
        <img src="pic-sim-elastisity-sport.png" alt="Запустить симуляцию">
    </a>

</body>
</html>
