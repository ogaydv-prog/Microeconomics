<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Лекция 3</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #f4f4f9;
        }
        .btn {
            display: block;
            border: none;
            padding: 0;
            cursor: pointer;
            transition: transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1), filter 0.3s ease;
            width: 250px;
        }
        .btn:hover {
            transform: scale(1.05);
            filter: drop-shadow(0 0 15px rgba(0, 255, 208, 0.6));
        }
        .btn:active {
            transform: scale(0.98);
        }
        img {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

    <!-- Ссылка на документ с лекцией -->
    <a href="https://docs.google.com/document/d/1ujzGrdFF4hRhqH4YwgkIPkz7C6Jf7GK1/edit?usp=drive_link&ouid=109725301150629205728&rtpof=true&sd=true" target="_blank" class="btn">
        <!-- Изображение кнопки -->
        <img src="pic-lecture3.png" alt="Открыть Лекцию 3" onerror="this.src='https://via.placeholder.com/250x150?text=Лекция+3'">
    </a>

</body>
</html>
