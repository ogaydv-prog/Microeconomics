<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: transparent;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }
  
  .main-tile-btn {
    background: none;
    border: none;
    padding: 0;
    cursor: pointer;
    display: inline-block;
    transition: transform 0.25s cubic-bezier(0.25, 0.8, 0.25, 1), filter 0.25s ease;
    outline: none;
    -webkit-tap-highlight-color: transparent;
    width: 100%;
    max-width: 250px;
    height: auto;
  }
  
  .main-tile-btn:hover {
    transform: scale(1.05);
    filter: drop-shadow(0 10px 20px rgba(0,0,0,0.15)) drop-shadow(0 0 12px rgba(56, 189, 248, 0.65));
  }
  
  .main-tile-btn:active {
    transform: scale(0.98);
  }
  
  .tile-img {
    width: 100%;
    height: auto;
    display: block;
    border-radius: 12px;
  }
</style>
</head>
<body>

  <!-- При нажатии открывается симулятор из этого же репозитория -->
  <a href="sim-marginal-analysis-micro.html" target="_blank" class="main-tile-btn">
    
    <img src="pic-marginal-analysis-micro.png" 
         class="tile-img" 
         alt="Запустить симулятор: Предельный анализ" 
         draggable="false" 
         onerror="this.onerror=null; this.src='https://raw.githubusercontent.com/ogaydv-prog/Microeconomics/master/pic-marginal-analysis-micro.png';">
         
  </a>

</body>
</html>
</html>
