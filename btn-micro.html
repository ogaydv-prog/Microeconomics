<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  /* Полный сброс отступов и скроллбаров для идеальной посадки на Google Сайте */
  body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: transparent;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }
  
  /* Наша фирменная пружинящая кнопка */
  .main-tile-btn {
    background: none;
    border: none;
    padding: 0;
    cursor: pointer;
    display: inline-block;
    transition: transform 0.25s cubic-bezier(0.25, 0.8, 0.25, 1), filter 0.25s ease;
    outline: none;
    -webkit-tap-highlight-color: transparent;
    width: 100%;
    max-width: 250px; /* Идеальный размер плитки, совпадающий со всеми остальными */
    height: auto;
  }
  
  /* Эффект плавного увеличения и мягкого голубого свечения эластичности при наведении */
  .main-tile-btn:hover {
    transform: scale(1.05);
    filter: drop-shadow(0 10px 20px rgba(0,0,0,0.15)) drop-shadow(0 0 12px rgba(56, 189, 248, 0.65));
  }
  
  /* Эффект физического клика */
  .main-tile-btn:active {
    transform: scale(0.98);
  }
  
  .tile-img {
    width: 100%;
    height: auto;
    display: block;
    border-radius: 12px;
  }
</style>
</head>
<body>

  <!-- При нажатии на кнопку открывается файл силлабуса на Google Диске в новом окне -->
  <a href="https://drive.google.com/file/d/1jDfn3lzOBQc9gDCD7PVomLRD8YaBfJiF/view?usp=drive_link" target="_blank" class="main-tile-btn">
    <!-- Изображение кнопки pic-micro.png из репозитория Microeconomics -->
    <img src="https://raw.githubusercontent.com/ogaydv-prog/Microeconomics/master/pic-micro.png" 
         class="tile-img" 
         alt="Перейти к силлабусу по микроэкономике" 
         draggable="false" 
         onerror="this.src='https://placehold.co/250x250/0f172a/38bdf8?text=Силлабус'">
  </a>

</body>
</html>
