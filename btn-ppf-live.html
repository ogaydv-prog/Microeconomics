<!DOCTYPE html>
<html>
<head>
<style>
  body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: transparent; /* Фон прозрачный, чтобы иконка идеально вписалась */
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  .live-wrapper {
    display: inline-block;
    cursor: pointer;
    transition: transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
    /* Мягкая бесконечная пульсация всей иконки */
    animation: livePulse 3s infinite ease-in-out;
  }

  /* Эффект, когда студент наводит мышку на вашу иконку */
  .live-wrapper:hover {
    transform: scale(1.06) rotate(1deg); /* Иконка красиво увеличивается и качнется на 1 градус */
    filter: drop-shadow(0 10px 20px rgba(0,0,0,0.15)); /* Появится мягкая глубинная тень */
  }

  .live-wrapper:active {
    transform: scale(0.98);
  }

  .live-icon {
    width: 100%;
    max-width: 200px; /* Можете отрегулировать размер под ваш сайт */
    height: auto;
    display: block;
    border-radius: 15px; /* Чтобы скругления вашей карточки смотрелись мягко */
  }

  @keyframes livePulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.02); } /* Иконка будет едва заметно "дышать", привлекая внимание */
    100% { transform: scale(1); }
  }
</style>
</head>
<body>

  <a href="https://ogaydv-prog.github.io/Simulator-NPV/" target="_blank" class="live-wrapper">
    <img src="icon-ppf.png" class="live-icon" alt="Симулятор КПВ">
  </a>

</body>
</html>
