<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Полностью убираем любые отступы и скроллбары, чтобы размер соответствовал картинке */
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: transparent;
        }
        
        .btn-img {
            /* Плавный переход с пружинящим эффектом кубического Безье для "оживления" */
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), filter 0.3s ease;
            cursor: pointer;
            display: block;
            /* Убеждаемся, что картинка не растягивается сверх меры */
            max-width: 100%;
            height: auto;
            border-radius: 16px; /* Мягкое брендовое скругление краев */
        }

        /* Эффект при наведении — кнопка оживает, слегка приподнимается и подсвечивается */
        .btn-img:hover {
            transform: scale(1.04) translateY(-4px);
            /* Двойная подсветка: глубокий синий и благородный золотой цвета AlmaU */
            filter: brightness(1.12) 
                    drop-shadow(0 12px 20px rgba(30, 64, 175, 0.45)) 
                    drop-shadow(0 0 15px rgba(218, 192, 163, 0.55));
        }

        /* Эффект при нажатии — кнопка упруго вдавливается */
        .btn-img:active {
            transform: scale(0.97) translateY(-1px);
            filter: brightness(0.95) drop-shadow(0 4px 8px rgba(30, 64, 175, 0.3));
        }
    </style>
</head>
<body>

    <!-- Ссылка на симулятор в новом окне -->
    <a href="sim-task3-deman-supply-analysis.html" target="_blank">
        <img src="https://raw.githubusercontent.com/ogaydv-prog/Simulator-NPV/main/pic-sim-task-demand-supply.png" 
             alt="Анализ Спроса, Предложения и Издержек — ВШБ AlmaU" 
             class="btn-img"
             draggable="false">
    </a>

</body>
</html>
