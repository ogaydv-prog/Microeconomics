<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<style>
  /* Убираем прокрутку полностью */
  html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: transparent;
    font-family: 'Segoe UI', Roboto, sans-serif;
    width: 100%;
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  /* Контейнер строго под размер вашей иконки */
  .tile-container {
    position: relative;
    width: 220px;
    height: 150px; /* Высота вашей стандартной плитки */
    border-radius: 12px;
    cursor: pointer;
    perspective: 1000px; /* Для красивого эффекта */
  }

  .tile-card {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.6s cubic-bezier(0.25, 0.8, 0.25, 1);
  }

  /* Класс, который сработает при клике */
  .tile-container.flipped .tile-card {
    transform: rotateY(180deg);
  }

  .front, .back {
    position: absolute;
    width: 100%;
    height: 100%;
    backface-visibility: hidden;
    border-radius: 12px;
    box-sizing: border-box;
  }

  /* Лицевая сторона — ваша картинка */
  .front {
    background: transparent;
  }
  .front img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 12px;
    transition: transform 0.25s ease, filter 0.25s ease;
  }
  .tile-container:not(.flipped):hover .front img {
    transform: scale(1.03);
    filter: drop-shadow(0 5px 15px rgba(0,0,0,0.15)) drop-shadow(0 0 8px rgba(244, 67, 54, 0.4));
  }

  /* Обратная сторона — красивое меню со ссылками внутри плитки */
  .back {
    background: #ffffff;
    border: 2px solid #cc1818; /* Красный контур YouTube */
    transform: rotateY(180deg);
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 8px;
  }

  .back a {
    color: #333333;
    text-decoration: none;
    font-size: 11px;
    font-weight: 700;
    padding: 6px 8px;
    margin: 2px 0;
    border-radius: 6px;
    background: #f9f9f9;
    border-bottom: 1px solid #eee;
    transition: background 0.2s, color 0.2s;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .back a:hover {
    background: #ffebee;
    color: #cc1818;
  }
</style>
</head>
<body>

  <div class="tile-container" id="videoTile">
    <div class="tile-card">
      <!-- Лицо плитки -->
      <div class="front">
        <img src="pic-video.png" alt="Видеоматериалы">
      </div>
      <!-- Меню внутри плитки -->
      <div class="back">
        <a href="https://www.youtube.com/watch?v=7lMB1yGrRQ0" target="_blank" onclick="event.stopPropagation();">📺 Видеоурок 1</a>
        <a href="https://www.youtube.com/watch?v=iKvnFUW8WHQ" target="_blank" onclick="event.stopPropagation();">📺 Видеоурок 2</a>
        <a href="https://www.youtube.com/watch?v=AY1CuqkQMqc&list=PL4t_m8S_6E2BdsHD3G78-h2xhtauHUrIG&index=76" target="_blank" onclick="event.stopPropagation();">📺 Доп. разбор</a>
      </div>
    </div>
  </div>

  <script>
    // Скрипт для переворота по клику
    const tile = document.getElementById('videoTile');
    tile.addEventListener('click', function() {
      this.classList.toggle('flipped');
    });
  </script>

</body>
</html>
