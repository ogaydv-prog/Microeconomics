<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  /* Полный сброс отступов и скрытие скроллбаров для идеальной посадки во фрейм */
  body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: transparent;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }
  
  /* Фирменная пружинящая кнопка-плитка */
  .main-tile-btn {
    background: none;
    border: none;
    padding: 0;
    cursor: pointer;
    display: inline-block;
    transition: transform 0.25s cubic-bezier(0.25, 0.8, 0.25, 1), filter 0.25s ease;
    outline: none;
    -webkit-tap-highlight-color: transparent;
    width: 100%;
    max-width: 250px;
    height: auto;
  }
  
  /* Эффект плавного увеличения и мягкого голубого свечения при наведении */
  .main-tile-btn:hover {
    transform: scale(1.05);
    filter: drop-shadow(0 10px 20px rgba(0,0,0,0.15)) drop-shadow(0 0 12px rgba(56, 189, 248, 0.65));
  }
  
  /* Эффект физического клика */
  .main-tile-btn:active {
    transform: scale(0.98);
  }
  
  .tile-img {
    width: 100%;
    height: auto;
    display: block;
    border-radius: 12px;
  }
</style>
</head>
<body>

  <!-- Ссылка ведет на страницу Введение в микроэкономику на твоем новом сайте -->
  <a href="https://sites.google.com/view/microeconomics-almau/%D0%B7%D0%B0%D0%BD%D1%8F%D1%82%D0%B8%D1%8F/%D0%B2%D0%B2%D0%B5%D0%B4%D0%B5%D0%BD%D0%B8%D0%B5-%D0%B2-%D0%BC%D0%B8%D0%BA%D1%80%D0%BE%D1%8D%D0%BA%D0%BE%D0%BD%D0%BE%D0%BC%D0%B8%D0%BA%D1%83" target="_blank" class="main-tile-btn">
    
    <!-- Сначала пробуем относительный путь, при сбое — абсолютную прямую ссылку на новую картинку pic-vvedenie.png -->
    <img src="pic-vvedenie.png" 
         class="tile-img" 
         alt="Перейти к разделу: Введение в микроэкономику" 
         draggable="false" 
         onerror="this.onerror=null; this.src='https://raw.githubusercontent.com/ogaydv-prog/Microeconomics/master/pic-vvedenie.png';">
         
  </a>

</body>
</html>
