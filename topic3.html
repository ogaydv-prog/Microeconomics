<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<style>
  body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: transparent;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }
  /* Наша фирменная оживающая кнопка-плитка */
  .main-tile-btn {
    background: none;
    border: none;
    padding: 0;
    cursor: pointer;
    display: inline-block;
    transition: transform 0.25s cubic-bezier(0.25, 0.8, 0.25, 1), filter 0.25s ease;
  }
  /* Эффект увеличения и красивого свечения при наведении */
  .main-tile-btn:hover {
    transform: scale(1.05);
    filter: drop-shadow(0 10px 20px rgba(0,0,0,0.15)) drop-shadow(0 0 10px rgba(0, 229, 255, 0.5));
  }
  .main-tile-btn:active {
    transform: scale(0.98);
  }
  .tile-img {
    width: 100%;
    max-width: 250px;
    height: auto;
    display: block;
    border-radius: 15px;
  }
</style>
</head>
<body>

  <button id="btn-topic3" class="main-tile-btn">
    <img src="pic-topic3.png" class="tile-img" alt="Тема 3: Рыночные силы спроса и предложения">
  </button>

<script>
  document.getElementById("btn-topic3").addEventListener("click", function() {
    // Вставьте вместо текста ниже ссылку на созданную страницу "Рыночные силы" внутри вашего Google Сайта
    window.open("ССЫЛКА_НА_СТРАНИЦУ_РЫНОЧНЫЕ_СИЛЫ_НА_GOOGLE_САЙТЕ", "_blank");
  });
</script>

</body>
</html>
